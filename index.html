    const parseStart = (iso) => { const d = new Date((iso || DEFAULT_START) + "T00:00:00"); return isNaN(d) ? new Date(DEFAULT_START + "T00:00:00") : d; };
    const dayDate = (n, startIso) => { const d = parseStart(startIso); d.setDate(d.getDate() + n - 1); return d; };

      const t = new Date(); t.setHours(0,0,0,0);
      const s = parseStart(startIso); s.setHours(0,0,0,0);
      const diff = Math.floor((t - s) / 86400000) + 1;
      return Math.min(Math.max(diff, 1), TOTAL_DAYS);
    };
    const todayIso = () => { const d = new Date(); return d.toISOString().slice(0,10); };

    const copyText = async (text) => { try { await navigator.clipboard.writeText(text); return true; } catch { return false; } };
    const openWA = (text) => { try { window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank", "noopener"); } catch {} };
    const minsAgo = (ts) => {
      const m = Math.floor((Date.now() - ts) / 60000);
      if (m < 1) return "just now"; if (m < 60) return m + "m ago";
      const h = Math.floor(m / 60); if (h < 24) return h + "h ago";
      return Math.floor(h / 24) + "d ago";
    };

    function computeStats(days, startIso) {
      let points = 0, perfectDays = 0, daysLogged = 0;
      const counts = { prayer: 0, bible: 0, call: 0, share: 0, workout: 0, post: 0 };
      const callNames = new Set();
      let breakthroughs = 0, miracles = 0;
      for (let i = 1; i <= TOTAL_DAYS; i++) {
        const d = days[i]; if (!d) continue;
        const done = dayDone(d);
        if (done > 0 || d.journal || d.breakthrough || d.miracle) daysLogged++;
        points += done * 10;
        if (done === TASKS.length) { perfectDays++; points += 40; }
        for (const t of TASKS) if (d.tasks && d.tasks[t.id]) counts[t.id]++;
        (d.calls || []).forEach(c => { if (c.done && c.name) callNames.add(c.name.trim().toLowerCase()); });
        if (d.breakthrough) breakthroughs++;
        if (d.miracle) miracles++;
      }
      let streak = 0;
      const td = todayNum(startIso);
      for (let i = td; i >= 1; i--) {
        if (dayDone(days[i]) === TASKS.length) streak++; else break;
      }
      return { points, perfectDays, daysLogged, counts, uniqueCalls: callNames.size, breakthroughs, miracles, streak };
    }

    function rankFor(points) {
      let idx = 0;
      for (let i = 0; i < RANKS.length; i++) if (points >= RANKS[i].min) idx = i;
      const cur = RANKS[idx]; const next = RANKS[idx + 1] || null;
      return { cur, next, pct: next ? Math.min(100, Math.round(((points - cur.min) / (next.min - cur.min)) * 100)) : 100 };
    }

       create unique index if not exists lgnd60_users_legendario_idx on lgnd60_users(legendario_num) where legendario_num is not null;

       -- Or create from scratch:
       create table if not exists lgnd60_users (
         user_id text primary key,
         legendario_num text,
         name text not null,
         team text default '',
         start_date text default '2026-06-22',

       );
       create table if not exists lgnd60_live (
         user_id text primary key,
         name text not null,
         team text default '',
         activity text not null,
         started_at bigint not null,
         updated_at timestamp with time zone default now()
       );

       );
       alter table lgnd60_users enable row level security;
       alter table lgnd60_live enable row level security;
       alter table lgnd60_feed enable row level security;
       drop policy if exists "anon all users" on lgnd60_users;
       drop policy if exists "anon all live" on lgnd60_live;
       drop policy if exists "anon all feed" on lgnd60_feed;
       create policy "anon all users" on lgnd60_users for all using (true) with check (true);
       create policy "anon all live"  on lgnd60_live  for all using (true) with check (true);
       create policy "anon all feed"  on lgnd60_feed  for all using (true) with check (true);
    */

    const api = {
      // Look up an existing brother by his Legendario # — returns full state or null
      async loginByLegendarioNum(num) {
        if (!sbReady() || !num) return null;
        try {
          const { data, error } = await sb.from("lgnd60_users")
            .select("*").eq("legendario_num", String(num).trim()).maybeSingle();
          if (error) { console.warn("login lookup:", error.message); return null; }
          if (!data) return null;
          return {
            profile: {
              userId: data.user_id, legendarioNum: data.legendario_num || "",
              name: data.name, team: data.team || "",
              startDate: data.start_date || DEFAULT_START,
            },
            days: data.days_data || {},
          };
        } catch (e) { console.warn("login failed:", e?.message); return null; }
      },
      async upsertUser(profile, days, stats, rankName) {
        if (!sbReady() || !profile) return false;
        try {
          const { error } = await sb.from("lgnd60_users").upsert({
            user_id: profile.userId,
            legendario_num: profile.legendarioNum || null,
            name: profile.name, team: profile.team || "",
            start_date: profile.startDate || DEFAULT_START,
            points: stats.points, streak: stats.streak, perfect_days: stats.perfectDays,
            days_logged: stats.daysLogged, rank: rankName, last_active: Date.now(),
            days_data: days || {},
          }, { onConflict: "user_id" });
          if (error) { console.warn("upsertUser error:", error.message || error.code || JSON.stringify(error)); return false; }
          return true;
        } catch (e) { console.warn("upsertUser failed:", e?.message || String(e)); return false; }
      },
      async fetchLeaderboard() {
        if (!sbReady()) return lsGet(LS.LB) || {};
        try {
          const { data, error } = await sb.from("lgnd60_users")
            .select("user_id,legendario_num,name,team,points,streak,perfect_days,days_logged,rank,last_active")
            .order("perfect_days", { ascending: false }).order("streak", { ascending: false }).order("points", { ascending: false });
          if (error) { console.warn("fetchLeaderboard error:", error.message || error.code || JSON.stringify(error)); return lsGet(LS.LB) || {}; }
          const map = {};
          (data || []).forEach(r => {
            map[r.user_id] = {
              userId: r.user_id, legendarioNum: r.legendario_num || "",
              name: r.name, team: r.team || "",
              points: r.points || 0, streak: r.streak || 0, perfectDays: r.perfect_days || 0,
              daysLogged: r.days_logged || 0, rank: r.rank || "Iniciado", lastActive: Number(r.last_active) || 0,
            };
          });
          lsSet(LS.LB, map);
          return map;
        } catch (e) { console.warn("fetchLeaderboard failed:", e?.message || String(e)); return lsGet(LS.LB) || {}; }
      },
      async setLive(sess) {
        if (!sbReady()) return false;
        try {
          const { error } = await sb.from("lgnd60_live").upsert({
            user_id: sess.userId, name: sess.name, team: sess.team || "",
            activity: sess.activity, started_at: sess.startedAt,
          }, { onConflict: "user_id" });
          return !error;
        } catch (e) { return false; }
      },
      async endLive(userId) {
        if (!sbReady()) return false;
        try { await sb.from("lgnd60_live").delete().eq("user_id", userId); return true; }
        catch (e) { return false; }
      },
      async fetchLive() {
        if (!sbReady()) return lsGet(LS.LIVE) || {};
        try {
          const cutoff = Date.now() - 90 * 60 * 1000;
          const { data, error } = await sb.from("lgnd60_live").select("*").gte("started_at", cutoff);
          if (error) return lsGet(LS.LIVE) || {};
          const map = {};
          (data || []).forEach(r => {
            map[r.user_id] = { userId: r.user_id, name: r.name, team: r.team || "", activity: r.activity, startedAt: Number(r.started_at) };
          });
          lsSet(LS.LIVE, map);
          return map;
        } catch { return lsGet(LS.LIVE) || {}; }
      },
      async pushFeed(entry) {
        if (!sbReady()) {
          const list = [entry, ...(lsGet(LS.FEED) || [])].slice(0, 120);
          lsSet(LS.FEED, list);
          return list;
        }
        try {
          const { error } = await sb.from("lgnd60_feed").insert({
            id: entry.id, user_id: entry.userId, name: entry.name, team: entry.team || "",
            type: entry.type, content: entry.content, day: entry.day, ts: entry.ts,
          });
          if (error) console.warn("pushFeed:", error.message);
          return await api.fetchFeed();
        } catch (e) { return lsGet(LS.FEED) || []; }
      },
      async fetchFeed() {
        if (!sbReady()) return lsGet(LS.FEED) || [];
        try {
          const { data, error } = await sb.from("lgnd60_feed").select("*").order("ts", { ascending: false }).limit(120);
          if (error) return lsGet(LS.FEED) || [];
          const list = (data || []).map(r => ({
            id: r.id, userId: r.user_id, name: r.name, team: r.team || "",
            type: r.type, content: r.content, day: r.day, ts: Number(r.ts),
          }));
          lsSet(LS.FEED, list);
          return list;
        } catch { return lsGet(LS.FEED) || []; }
      },
    };

    /* ============================== SMALL COMPONENTS ============================== */
    // Legendarios pennant — proportioned to match the official flag: tall white pennant on a pole,
    // backpacked hiker with walking staff in profile, subtle wave on the trailing edge.
    function ForgeMark({ size = 40, dark = false }) {
      const pennant = dark ? "#0c0b0a" : "#f1ece1";
      const hiker = dark ? "#f1ece1" : "#0c0b0a";
      const pole = "#d35a2f";
      return (
        <svg width={size} height={size} viewBox="0 0 64 64" style={{ flexShrink: 0,
          filter: dark ? "none" : "drop-shadow(0 2px 5px rgba(211,90,47,0.35))" }}>

          <rect x="10" y="4" width="2" height="56" fill={pole} rx="1" />
          {/* Pole base ball */}
          <circle cx="11" cy="3" r="1.8" fill={pole} />
          {/* Pennant — flowing triangle with subtle wave on trailing edge */}
          <path d="M 12 8
                   C 28 9, 44 11, 58 14
                   Q 60 16, 58 18
                   C 44 22, 30 26, 12 28
                   Z"
                fill={pennant} />
          {/* Hiker silhouette inside pennant - climbing pose, backpack, staff */}
          <g fill={hiker}>
            {/* Head */}
            <circle cx="26" cy="13.5" r="1.6" />
            {/* Backpack (behind torso) */}

            {/* Torso leaning forward */}
            <path d="M 24.5 15.2 L 28 15.2 L 29 18 L 27.8 20.5 L 25 20.5 Z" />
            {/* Front leg striding */}
            <path d="M 27.5 20 L 29.5 20.4 L 31 24.5 L 29.6 25 L 28 22 Z" />
            {/* Back leg pushing off */}
            <path d="M 25 20.5 L 26.5 20.5 L 25.5 25.5 L 24 25.5 Z" />
            {/* Walking staff angled forward */}
            <path d="M 31 14 L 32 14.4 L 30.5 26 L 29.5 25.6 Z" />
            {/* Forward arm holding staff */}

          </g>
        </svg>
      );
    }

    function Ring({ pct, size = 132, stroke = 11, children }) {
      const r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const off = c * (1 - pct / 100);
      const gid = "rg" + Math.random().toString(36).slice(2, 6);
      return (
        <div style={{ position: "relative", width: size, height: size }}>
          <svg width={size} height={size}>
            <defs>
              <linearGradient id={gid} x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#b04a25" /><stop offset="100%" stopColor="#e87a4d" />
              </linearGradient>
            </defs>
            <circle cx={size/2} cy={size/2} r={r} stroke="#1a1510" strokeWidth={stroke} fill="none" />
            <circle cx={size/2} cy={size/2} r={r} stroke={"url(#" + gid + ")"} strokeWidth={stroke} fill="none"
              strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
              transform={"rotate(-90 " + (size/2) + " " + (size/2) + ")"}
              style={{ transition: "stroke-dashoffset 0.7s cubic-bezier(.4,0,.2,1)" }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center" }}>{children}</div>
        </div>
      );
    }

    function Confetti({ fire }) {
      const [pieces, setPieces] = useState([]);
      useEffect(() => {
        if (!fire) return;
        const cols = ["#d35a2f", "#e87a4d", "#b04a25", "#f1ede4", "#46cf86"];
        const arr = Array.from({ length: 60 }, (_, i) => ({
          id: i + "_" + fire, left: Math.random() * 100, delay: Math.random() * 0.25,
          dur: 1.6 + Math.random() * 1.4, size: 6 + Math.random() * 8,
          col: cols[Math.floor(Math.random() * cols.length)], rot: Math.random() * 360,
        }));
        setPieces(arr);
        const t = setTimeout(() => setPieces([]), 3200);
        return () => clearTimeout(t);
      }, [fire]);
      if (!pieces.length) return null;
      return (
        <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 9999, overflow: "hidden" }}>
          {pieces.map(p => (
            <div key={p.id} style={{ position: "absolute", top: 0, left: p.left + "%",
              width: p.size, height: p.size * 0.5, background: p.col, borderRadius: 1,
              transform: "rotate(" + p.rot + "deg)",
              animation: "lgndfall " + p.dur + "s " + p.delay + "s ease-in forwards" }} />
          ))}
        </div>
      );
    }

    /* ============================== TODAY VIEW ============================== */
    function TodayView({ stats, td, daysLeft, profile, community, selectedDay, setSelectedDay,
      dayObj, setDay, toggleTask, pushFeed, showToast }) {
      const done = dayDone(dayObj);
      const pct = Math.round((done / TASKS.length) * 100);
      const fuel = FUEL[(selectedDay - 1) % FUEL.length];
      const isFuture = selectedDay > td;
      const isGrace = selectedDay > PERFECT_GOAL;
      const iron = isIron(stats.perfectDays);

      const checkinText =
        "🔥 LGND-60 · Day " + selectedDay + "/" + TOTAL_DAYS + " · " + (profile.name || "") + "\n" +
        TASKS.map(t => (dayObj.tasks && dayObj.tasks[t.id] ? "✅" : "⬜") + " " + t.short).join("  ") + "\n" +
        done + "/6 today · 🔥 " + stats.streak + " streak · 🏆 " + stats.perfectDays + " perfect" +
        (iron ? " · ⚒️ IRON" : "") + "\n#LGND60 #Legendarios";

      const doCopy = async () => {
        const ok = await copyText(checkinText);
        showToast(ok ? "✓ Check-in copied for WhatsApp" : "Use the WhatsApp button →");
      };

      const [callName, setCallName] = useState("");
      const [callNum, setCallNum] = useState("");
      const [editIdx, setEditIdx] = useState(null);
      const calls = dayObj.calls || [];

      const logCall = () => {
        if (!callName.trim()) return;
        setDay(cur => {
          const list = [...(cur.calls || [])];
          if (editIdx !== null) list[editIdx] = { name: callName.trim(), number: callNum.trim(), done: list[editIdx] ? list[editIdx].done : true };
          else list.push({ name: callName.trim(), number: callNum.trim(), done: true });
          return { calls: list, tasks: { ...(cur.tasks || {}), call: list.some(c => c.done) } };
        });
        setCallName(""); setCallNum(""); setEditIdx(null);
      };
      const toggleCall = (i) => setDay(cur => {
        const list = [...(cur.calls || [])]; list[i] = { ...list[i], done: !list[i].done };
        return { calls: list, tasks: { ...(cur.tasks || {}), call: list.some(c => c.done) } };
      });
      const removeCall = (i) => setDay(cur => {
        const list = (cur.calls || []).filter((_, x) => x !== i);
        return { calls: list, tasks: { ...(cur.tasks || {}), call: list.some(c => c.done) } };
      });

      return (
        <>
          {/* Hero */}
          <section style={{ ...card, padding: "20px 16px", textAlign: "center", position: "relative", overflow: "hidden" }}>

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, position: "relative" }}>

              <div>
                <div style={{ fontSize: 12, letterSpacing: 2, color: C.gold, fontWeight: 800, textTransform: "uppercase" }}>

                <div style={{ fontSize: 11, color: C.sub }}>
                  {fmtDate(dayDate(selectedDay, profile?.startDate))}{isGrace ? " · grace day" : ""}

              <button onClick={() => setSelectedDay(d => Math.min(TOTAL_DAYS, d + 1))} style={navBtn}>{I.chevR({ size: 20 })}</button>
            </div>

            <div style={{ display: "flex", justifyContent: "center", margin: "6px 0 4px", position: "relative" }}>
              <Ring pct={pct}>
                <div style={{ fontSize: 36, fontWeight: 900, color: pct === 100 ? C.gold : C.text, lineHeight: 1 }}>
                  {done}<span style={{ fontSize: 18, color: C.dim }}>/{TASKS.length}</span>
                </div>
                <div style={{ fontSize: 10, letterSpacing: 1.5, color: C.dim, textTransform: "uppercase", marginTop: 3 }}>
                  {pct === 100 ? "Forged 🔥" : "Disciplines"}
                </div>
              </Ring>

              <Chip icon={I.flame} label={stats.streak + " streak"} hot />
              <Chip icon={I.trophy} label={stats.perfectDays + " perfect"} />
              <Chip icon={I.users} label={(community.count || 1) + " in it"} />
              <Chip icon={I.clock} label={daysLeft + "d to TOP"} />
            </div>
          </section>

          {/* Fuel */}
          <div style={{ ...card, padding: "11px 14px", marginTop: 12, display: "flex", gap: 10, alignItems: "flex-start" }}>
            {I.quote({ size: 16, color: C.amber, style: { marginTop: 2 } })}
            <div style={{ fontSize: 13, color: C.text, fontStyle: "italic", lineHeight: 1.4 }}>{fuel}</div>
          </div>

          {isFuture && (
            <div style={{ ...card, marginTop: 12, padding: "10px 14px", color: C.sub, fontSize: 12, textAlign: "center" }}>
              This day hasn't arrived yet — pre-load your plan.
            </div>
          )}

          {/* Tasks */}
          <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 8 }}>
            {TASKS.map(t => t.isCall
              ? <CallRow key={t.id} t={t} done={!!(dayObj.tasks && dayObj.tasks.call)}

            </div>
          </section>

          <a href="https://chat.whatsapp.com/IPkjhZR4Rgt8KbJ5AML4vV?mode=gi_t" target="_blank" rel="noopener"
            style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              marginTop: 14, padding: "12px 14px", borderRadius: 10,
              border: "1px solid rgba(31,138,82,0.4)", background: "rgba(31,138,82,0.10)",
              color: "#46cf86", fontSize: 13, fontWeight: 800, textDecoration: "none",
              letterSpacing: 0.4, textTransform: "uppercase" }}>
            {I.users({ size: 16, color: "#46cf86" })} Join the LGND-60 WhatsApp Group
          </a>

          <div style={{ textAlign: "center", marginTop: 18, fontSize: 10, color: C.faint, lineHeight: 1.6 }}>
            Same link = same brotherhood. Share with your camp.<br />Iron sharpens iron. 🔨
          </div>

          {shareModal && (
            <div onClick={() => setShareModal(false)} style={{ position: "fixed", inset: 0, zIndex: 9999,
              background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
              <div onClick={e => e.stopPropagation()} style={{ ...card, padding: 18, maxWidth: 340, width: "100%" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <b style={{ color: C.gold, fontSize: 14 }}>Copy your progress</b>
                  <button onClick={() => setShareModal(false)} style={iconBtn}>{I.x({ size: 16, color: C.sub })}</button>
                </div>
                <textarea readOnly value={shareText} rows={6} onFocus={e => e.target.select()}
                  style={{ ...input, resize: "none", lineHeight: 1.5, fontSize: 12 }} />
                <div style={{ fontSize: 10.5, color: C.dim, marginTop: 8 }}>Tap, select all, copy.</div>
              </div>
            </div>
          )}
        </>
      );
    }

    /* ============================== ONBOARDING ============================== */
    function Onboarding({ onSignUp, onSignIn }) {
      const [mode, setMode] = useState("signup"); // 'signup' | 'signin'
      const [name, setName] = useState("");
      const [legNum, setLegNum] = useState("");
      const [start, setStart] = useState(DEFAULT_START);
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const today = todayIso();

      const submit = async () => {
        setErr("");
        if (mode === "signin") {
          if (!legNum.trim()) { setErr("Enter your Legendario number"); return; }
          setBusy(true);
          const found = await onSignIn(legNum.trim());
          setBusy(false);
          if (!found) setErr("No brother found with that Legendario #. Sign up if you're new.");
          return;
        }
        if (!name.trim()) { setErr("Enter your name"); return; }
        if (!legNum.trim()) { setErr("Enter your Legendario #"); return; }
        setBusy(true);
        const ok = await onSignUp(name.trim(), legNum.trim(), start);
        setBusy(false);
        if (!ok) setErr("That Legendario # is already taken. Try Sign In instead.");
      };

      const startDateLabel = fmtFullDate(parseStart(start));
      const isDefault = start === DEFAULT_START;
      const tabBtn = (active) => ({
        flex: 1, padding: "11px 0", border: "none", cursor: "pointer",
        background: active ? "rgba(211,90,47,0.18)" : "transparent",
        color: active ? C.gold : C.dim,
        borderBottom: "2px solid " + (active ? C.gold : "transparent"),
        fontSize: 12, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase",
      });

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.text,
          display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ width: "100%", maxWidth: 400 }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 18 }}><ForgeMark size={84} /></div>
            <div style={{ fontSize: 32, fontWeight: 900, letterSpacing: 1, color: C.gold, textAlign: "center" }}>LGND·60</div>
            <div style={{ fontSize: 12, color: C.sub, letterSpacing: 1, marginTop: 6, lineHeight: 1.6, textAlign: "center" }}>
              60 days. Six disciplines. One brotherhood.<br />Forge yourself before the next TOP.
            </div>

            {/* tab toggle */}
            <div style={{ display: "flex", marginTop: 26, borderBottom: "1px solid " + C.border }}>
              <button onClick={() => { setMode("signup"); setErr(""); }} style={tabBtn(mode === "signup")}>New Brother</button>
              <button onClick={() => { setMode("signin"); setErr(""); }} style={tabBtn(mode === "signin")}>Sign In</button>
            </div>

            <div style={{ margin: "20px 0 10px" }}>
              {mode === "signup" ? (
                <>
                  <label style={lbl}>Your name</label>
                  <input autoFocus value={name} onChange={e => setName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && submit()}
                    placeholder="Brother's name" style={bigInput} />
                  <label style={{ ...lbl, marginTop: 14 }}>Your Legendario #</label>
                  <input value={legNum} onChange={e => setLegNum(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && submit()}
                    placeholder="e.g. 1247" style={bigInput} inputMode="numeric" />
                  <div style={{ fontSize: 11, color: C.dim, marginTop: 6 }}>
                    This is your unique ID. Use it to sign back in on any device.
                  </div>
                  <label style={{ ...lbl, marginTop: 14 }}>Your Day 1</label>
                  <input type="date" value={start} max={today} onChange={e => setStart(e.target.value || DEFAULT_START)} style={bigInput} />
                  <div style={{ fontSize: 11, color: C.dim, marginTop: 6, lineHeight: 1.5 }}>
                    {isDefault
                      ? <>Official start: <b style={{ color: C.gold }}>{startDateLabel}</b>. If you missed it, pick today.</>
                      : <>Your Day 1 is <b style={{ color: C.gold }}>{startDateLabel}</b>.</>}
                  </div>
                </>
              ) : (
                <>
                  <label style={lbl}>Your Legendario #</label>
                  <input autoFocus value={legNum} onChange={e => setLegNum(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && submit()}
                    placeholder="Enter your number" style={bigInput} inputMode="numeric" />
                  <div style={{ fontSize: 11, color: C.dim, marginTop: 8, lineHeight: 1.5 }}>
                    Signed in here before? Type your Legendario # and we'll pull up your progress — streak, perfect days, journal, all of it.
                  </div>
                </>
              )}
            </div>

            {err && (
              <div style={{ marginTop: 10, padding: "10px 12px", borderRadius: 9,
                background: "rgba(211,90,47,0.12)", border: "1px solid " + C.borderHi,
                color: C.gold, fontSize: 12, fontWeight: 600 }}>{err}</div>
            )}

            <button disabled={busy} onClick={submit} style={{
              width: "100%", marginTop: 14, padding: "14px 0", borderRadius: 11, border: "none",
              cursor: busy ? "wait" : "pointer",
              background: busy ? "#241a0c" : "linear-gradient(135deg,#b04a25,#d35a2f)",
              color: busy ? C.dim : "#0c0b0a", fontWeight: 900, fontSize: 15,
              letterSpacing: 1, textTransform: "uppercase" }}>
              {busy ? "…" : mode === "signin" ? "Sign In →" : "Enter the Trail →"}
            </button>
          </div>
        </div>
      );
    }

    /* ============================== MAIN APP ============================== */
    function App() {
      const [loaded, setLoaded] = useState(false);
      const [profile, setProfileState] = useState(null);
      const [days, setDays] = useState({});
      const [tab, setTab] = useState("today");
      const [selectedDay, setSelectedDay] = useState(1);
      const [confetti, setConfetti] = useState(0);
      const [toast, setToast] = useState(null);
      const [live, setLive] = useState(null);
      const [lb, setLb] = useState({});
      const [liveMap, setLiveMap] = useState({});
      const [feed, setFeed] = useState([]);
      const [community, setCommunity] = useState({ count: 0, iron: 0 });
      const [syncing, setSyncing] = useState(false);

      const startDate = profile?.startDate || DEFAULT_START;
      const lastPerfect = useRef(new Set());

      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2600);
      }, []);

      const setProfile = (updater) => setProfileState(p => typeof updater === "function" ? updater(p) : updater);

      // Load on mount
      useEffect(() => {
        const me = lsGet(LS.ME);
        if (me) {
          const p = me.profile || null;
          setProfileState(p);
          setDays(me.days || {});
          const seen = new Set();
          Object.entries(me.days || {}).forEach(([k, v]) => { if (dayDone(v) === TASKS.length) seen.add(k); });
          lastPerfect.current = seen;
          if (p) setSelectedDay(todayNum(p.startDate || DEFAULT_START));
        }
        refreshShared();
        setLoaded(true);
      }, []);

      const stats = useMemo(() => computeStats(days, startDate), [days, startDate]);
      const rank = useMemo(() => rankFor(stats.points), [stats.points]);

      // Save personal data locally
      useEffect(() => {
        if (!loaded || !profile) return;
        lsSet(LS.ME, { profile, days });
      }, [profile, days, loaded]);

      // Refresh shared data from Supabase (with localStorage fallback)
      const refreshShared = useCallback(async () => {
        setSyncing(true);
        try {
          const [newLb, newLive, newFeed] = await Promise.all([
            api.fetchLeaderboard(), api.fetchLive(), api.fetchFeed(),
          ]);
          setLb(newLb);
          setLiveMap(newLive);
          setFeed(Array.isArray(newFeed) ? newFeed : []);
          setCommunity({
            count: Object.keys(newLb).length,
            iron: Object.values(newLb).filter(v => isIron(v.perfectDays)).length,
          });
        } catch (e) { console.warn("refresh failed:", e); }
        setTimeout(() => setSyncing(false), 300);
      }, []);

      // Push my stats AND days_data to shared backend (debounced)
      useEffect(() => {
        if (!loaded || !profile) return;
        const t = setTimeout(async () => {
          await api.upsertUser(profile, days, stats, rank.cur.name);
          const summary = {
            userId: profile.userId, legendarioNum: profile.legendarioNum || "",
            name: profile.name, team: profile.team || "",
            points: stats.points, streak: stats.streak, perfectDays: stats.perfectDays,
            daysLogged: stats.daysLogged, rank: rank.cur.name, lastActive: Date.now(),
          };
          // refresh leaderboard locally so my row shows up immediately
          const newLb = { ...(lsGet(LS.LB) || {}), [profile.userId]: summary };
          lsSet(LS.LB, newLb);
          setLb(newLb);
          setCommunity({
            count: Object.keys(newLb).length,
            iron: Object.values(newLb).filter(v => isIron(v.perfectDays)).length,
          });
        }, 1200);
        return () => clearTimeout(t);
      }, [stats, profile, days, rank, loaded]);

      // Poll for updates every 12s + listen to cross-tab changes
      useEffect(() => {
        const handler = (e) => {
          if (e.key === LS.LB || e.key === LS.LIVE || e.key === LS.FEED) refreshShared();
        };
        window.addEventListener("storage", handler);
        const poll = setInterval(refreshShared, 12000);
        return () => { window.removeEventListener("storage", handler); clearInterval(poll); };
      }, [refreshShared]);

      // Confetti on perfect day
      useEffect(() => {
        if (!loaded) return;
        Object.entries(days).forEach(([k, v]) => {
          const perfect = dayDone(v) === TASKS.length;
          if (perfect && !lastPerfect.current.has(k)) {
            lastPerfect.current.add(k);
            setConfetti(x => x + 1);
            showToast("🎉 Perfect day forged. +100");
          } else if (!perfect && lastPerfect.current.has(k)) {
            lastPerfect.current.delete(k);
          }
        });
      }, [days, loaded]);

      const dayObj = days[selectedDay] || { tasks: {}, calls: [] };
      const setDay = useCallback((updater) => {
        setDays(prev => {
          const cur = prev[selectedDay] || { tasks: {}, calls: [] };
          const next = typeof updater === "function" ? updater(cur) : updater;
          return { ...prev, [selectedDay]: { ...cur, ...next } };
        });
      }, [selectedDay]);

      const toggleTask = (id) => {
        if (id === "call") return;
        setDay(cur => ({ tasks: { ...(cur.tasks || {}), [id]: !(cur.tasks && cur.tasks[id]) } }));
      };

      const goLive = async (activity) => {
        if (!profile) return;
        const sess = { userId: profile.userId, legendarioNum: profile.legendarioNum || "", name: profile.name, team: profile.team || "", activity, startedAt: Date.now() };
        setLive(sess);
        const newLive = { ...(lsGet(LS.LIVE) || {}), [profile.userId]: sess };
        lsSet(LS.LIVE, newLive);
        setLiveMap(newLive);
        showToast("📡 You're live: " + activity);
        await api.setLive(sess);
      };

      const endLive = async () => {
        if (!profile) return;
        setLive(null);
        const newLive = { ...(lsGet(LS.LIVE) || {}) };
        delete newLive[profile.userId];
        lsSet(LS.LIVE, newLive);
        setLiveMap(newLive);
        await api.endLive(profile.userId);
      };

      const pushFeed = async (type, content) => {
        if (!profile || !content || !content.trim()) return;
        const entry = {
          id: newId(), userId: profile.userId, legendarioNum: profile.legendarioNum || "",
          name: profile.name, team: profile.team || "",
          type, content: content.trim(), day: selectedDay, ts: Date.now(),
        };
        const newFeed = [entry, ...(lsGet(LS.FEED) || [])].slice(0, 120);
        lsSet(LS.FEED, newFeed);
        setFeed(newFeed);
        showToast("✓ Shared with the brotherhood");
        const updated = await api.pushFeed(entry);
        if (Array.isArray(updated)) setFeed(updated);
      };

      if (!loaded) {
        return (
          <div style={{ minHeight: "100vh", background: C.bg, color: C.gold,
            display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ textAlign: "center" }}>
              <ForgeMark size={60} />
              <div style={{ marginTop: 14, letterSpacing: 4, fontSize: 12, color: C.dim }}>LOADING THE TRAIL…</div>
            </div>
          </div>
        );
      }

      if (!profile) {
        const handleSignUp = async (nm, num, start) => {
          // Check if this Legendario # is already in use
          const existing = await api.loginByLegendarioNum(num);
          if (existing) return false; // collision — tell user to sign in instead
          const p = { userId: newId(), legendarioNum: num, name: nm,
            team: "", startDate: start || DEFAULT_START };
          setProfileState(p);
          setDays({});
          setSelectedDay(todayNum(p.startDate));
          lsSet(LS.ME, { profile: p, days: {} });
          return true;
        };
        const handleSignIn = async (num) => {
          const found = await api.loginByLegendarioNum(num);
          if (!found) return false;
          const p = found.profile;
          const loadedDays = found.days || {};
          setProfileState(p);
          setDays(loadedDays);
          setSelectedDay(todayNum(p.startDate));
          // seed lastPerfect so we don't fire confetti for old data
          const seen = new Set();
          Object.entries(loadedDays).forEach(([k, v]) => { if (dayDone(v) === TASKS.length) seen.add(k); });
          lastPerfect.current = seen;
          lsSet(LS.ME, { profile: p, days: loadedDays });
          showToast("✓ Welcome back, " + p.name);
          return true;
        };
        return <Onboarding onSignUp={handleSignUp} onSignIn={handleSignIn} />;
      }

      const td = todayNum(startDate);
      const daysLeft = TOTAL_DAYS - td;

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.text, position: "relative" }}>
          <Confetti fire={confetti} />
          {toast && (
            <div style={{ position: "fixed", top: 14, left: "50%", transform: "translateX(-50%)", zIndex: 9998,
              background: "rgba(20,15,6,0.97)", border: "1px solid " + C.borderHi, color: C.gold,
              padding: "9px 16px", borderRadius: 10, fontSize: 13, fontWeight: 700,
              boxShadow: "0 8px 30px rgba(0,0,0,0.6)" }}>
              {toast}
            </div>
          )}

          {/* Header */}
          <header style={{ position: "sticky", top: 0, zIndex: 50,
            background: "linear-gradient(180deg,#120a02 0%, rgba(8,8,12,0.92) 100%)",
            borderBottom: "1px solid " + C.border, padding: "12px 16px" }}>
            <div style={{ maxWidth: 540, margin: "0 auto", display: "flex", alignItems: "center", gap: 11 }}>
              <ForgeMark size={38} />
              <div>
                <div style={{ fontSize: 17, fontWeight: 900, letterSpacing: 1, color: C.gold, lineHeight: 1 }}>
                  LGND<span style={{ color: C.amber }}>·</span>60
                </div>
                <div style={{ fontSize: 9, color: sbReady() ? C.dim : C.red, letterSpacing: 2.5, textTransform: "uppercase", marginTop: 2 }}>
                  Forge a Legend{sbReady() ? "" : " · offline"}
                </div>
              </div>
              <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 4, color: C.gold, fontWeight: 800, fontSize: 14 }}>
                  {I.flame({ size: 16, color: C.gold, fill: stats.streak > 0 ? C.gold : "none" })}
                  {stats.streak}
                </div>
                <button onClick={() => live ? endLive() : goLive("Grinding")} style={{
                  display: "flex", alignItems: "center", gap: 5, padding: "6px 11px", borderRadius: 8, cursor: "pointer",
                  fontSize: 11, fontWeight: 800, letterSpacing: 0.5, textTransform: "uppercase",
                  border: "1px solid " + (live ? C.red : C.borderHi),
                  background: live ? "rgba(211,90,47,0.18)" : "transparent",
                  color: live ? C.red : C.gold }}>
                  <span style={{ width: 7, height: 7, borderRadius: 99,
                    background: live ? C.red : C.gold,
                    animation: live ? "lgndpulse 1.1s infinite" : "none" }} />
                  {live ? "Live" : "Go Live"}
                </button>
              </div>
            </div>
          </header>

          <main style={{ maxWidth: 540, margin: "0 auto", padding: "16px 14px 96px" }}>
            {tab === "today" && <TodayView stats={stats} td={td} daysLeft={daysLeft} profile={profile} community={community}
              selectedDay={selectedDay} setSelectedDay={setSelectedDay} dayObj={dayObj} setDay={setDay} toggleTask={toggleTask}
              pushFeed={pushFeed} showToast={showToast} />}
            {tab === "brothers" && <BrothersView profile={profile} community={community} lb={lb} liveMap={liveMap} feed={feed} refresh={refreshShared} loading={syncing} />}
            {tab === "me" && <MeView profile={profile} setProfile={setProfile} stats={stats} rank={rank} td={td} days={days} showToast={showToast} />}
          </main>

          {/* Bottom nav */}
          <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 50,
            background: "rgba(10,8,4,0.97)", borderTop: "1px solid " + C.border }}>
            <div style={{ maxWidth: 540, margin: "0 auto", display: "grid", gridTemplateColumns: "repeat(3,1fr)" }}>
              {[
                { id: "today", label: "Today", icon: I.home },
                { id: "brothers", label: "Brothers", icon: I.users },
                { id: "me", label: "Me", icon: I.award },
              ].map(t => {
                const on = tab === t.id;
                return (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{
                    background: "none", border: "none", cursor: "pointer", padding: "10px 0 12px",
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                    color: on ? C.gold : C.dim, position: "relative" }}>
                    {on && <span style={{ position: "absolute", top: 0, width: 26, height: 2, borderRadius: 2, background: C.gold }} />}
                    {t.icon({ size: 20 })}
                    <span style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>{t.label}</span>
                  </button>
                );
              })}
            </div>
          </nav>
        </div>
      );
    }

    /* ============================== RENDER ============================== */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
